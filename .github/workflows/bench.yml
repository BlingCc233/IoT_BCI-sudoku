name: benchmarks

on:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: run
        run: go run ./cmd/iotbci-bench -messages 200 -size 64 -timeout 30s -out bench.json
      - uses: actions/upload-artifact@v4
        with:
          name: bench
          path: bench.json

