name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: fmt
        run: |
          out="$(git ls-files '*.go' | xargs gofmt -l)"
          test -z "${out}"
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -count=1 ./...
      - name: race
        run: go test -race -count=1 ./...
      - name: coverage
        run: |
          mkdir -p coverage
          go test -covermode=atomic -coverprofile=coverage/coverage.out ./...
          go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt
      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: reproduce evidence steps (exclude cross-region benchmark)
        run: bash evidence_steps/run_all.sh
      - name: upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evidence-out
          path: evidence_steps/*/out
